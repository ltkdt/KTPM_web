<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>ECG Record Viewer</title>
		<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
		<link rel="stylesheet" href="style.css">
	</head>
	<body>
		<div class="container py-5">
			<header class="text-center mb-4">
				<h1 class="fw-bold">ECG Record Viewer</h1>
				<p class="text-muted">View and analyze ECG waveform data from stored records</p>
				<div class="btn-group mb-3" role="group" aria-label="env toggle">
					<a id="envDummy" href="profile.html" class="btn btn-primary" role="button">Patient X</a>
				</div>
			</header>

			<main>
				<div class="card shadow-sm records-card">
					<div class="card-header d-flex justify-content-between align-items-center">
						<div>
							<strong>Records</strong> <span class="text-muted">(15 total)</span>
						</div>
					</div>
					<div class="card-body p-0">
						<div class="table-responsive">
							<table class="table mb-0" id="recordsTable">
								<thead class="table-light small text-muted">
									<tr>
										<th style="width:80px">ID</th>
										<th>Name</th>
										<th class="action-column" style="width:120px">Actions</th>
									</tr>
								</thead>
								<tbody>
									<!-- rows injected by JS -->
									<!-- Detail panel is dynamically inserted into this container -->
									<tr id="detailContainer" class="d-none">
										<td colspan="3">
											<div id="detailPanel" class="detail-panel">
												<div class="detail-card shadow-sm">
													<button id="detailClose" class="btn-close" aria-label="Close"></button>
													<div class="circle-outer">
														<div class="circle-inner">
															<div id="bpmValue" class="bpm">60.3 bpm</div>
														</div>
													</div>
													<div class="detail-meta text-center text-muted mt-2" id="detailMeta">ecg_record_1.json</div>
													<canvas id="detailChart" width="600" height="240" style="max-width:100%;"></canvas>
												</div>
											</div>
										</td>
									</tr>
								</tbody>
							</table>
						</div>
					</div>
					<div class="card-footer d-flex justify-content-between align-items-center">
						<div>
							<button id="prevBtn" class="btn btn-sm btn-outline-secondary" disabled>Previous</button>
						</div>
						<div class="text-center text-muted small">Page <span id="pageInfo">1</span> of <span id="pageCount">1</span></div>
						<div>
							<button id="nextBtn" class="btn btn-sm btn-outline-secondary">Next</button>
						</div>
					</div>
				</div>
			</main>
			</div>
			<!-- scripts -->
			<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
			<script src="csv_module.js"></script>
			<script src="index.js"></script>
		</body>
	</html>
