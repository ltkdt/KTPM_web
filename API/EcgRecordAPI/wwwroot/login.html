<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - Hệ thống ECG</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .login-card {
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.05);
            padding: 40px;
            width: 100%;
            max-width: 450px;
            border: 1px solid #eaeaea;
        }
        .logo-text {
            position: absolute;
            top: 30px;
            left: 30px;
            font-weight: 700;
            font-size: 20px;
            color: #1a1a1a;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .logo-icon {
            color: #3b82f6;
            font-size: 24px;
        }
        .subtitle {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 5px;
        }
        .title {
            font-weight: 700;
            font-size: 32px;
            color: #111827;
            margin-bottom: 30px;
        }
        .form-control {
            padding: 12px 15px;
            border-radius: 8px;
            border: 1px solid #d1d5db;
            margin-bottom: 15px;
            font-size: 14px;
        }
        .form-control:focus {
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            border-color: #3b82f6;
        }
        .btn-primary {
            background-color: #3b82f6;
            border: none;
            padding: 12px;
            border-radius: 8px;
            font-weight: 600;
            width: 100%;
            margin-top: 10px;
        }
        .btn-primary:hover {
            background-color: #2563eb;
        }
        .form-check-label {
            font-size: 14px;
            color: #4b5563;
        }
        .forgot-link {
            font-size: 14px;
            color: #3b82f6;
            text-decoration: none;
            float: right;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .signup-text {
            text-align: center;
            margin-top: 25px;
            font-size: 14px;
            color: #6b7280;
        }
        .signup-text a {
            color: #3b82f6;
            text-decoration: none;
            font-weight: 500;
            cursor: pointer;
        }
        .signup-text a:hover {
            text-decoration: underline;
        }
        #errorMsg {
            display: none;
            color: #dc2626;
            font-size: 14px;
            margin-bottom: 15px;
            text-align: center;
        }
    </style>
</head>
<body>

    <div class="logo-text">
        <div class="logo-icon">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path>
                <polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline>
                <line x1="12" y1="22.08" x2="12" y2="12"></line>
            </svg>
        </div>
    </div>

    <div class="login-container">
        <div class="login-card">
            <div class="subtitle">Vui lòng nhập thông tin của bạn</div>
            <div class="title" id="formTitle">Chào mừng bạn quay lại</div>

            <div id="errorMsg">Tên đăng nhập hoặc mật khẩu không đúng.</div>

            <form id="loginForm">
                <input type="text" id="fullName" class="form-control" placeholder="Họ và tên" required>
                
                <div id="registerFields" style="display: none;">
                    <input type="number" id="age" class="form-control" placeholder="Tuổi">
                    <select id="gender" class="form-control">
                        <option value="" disabled selected>Chọn giới tính</option>
                        <option value="Nam">Nam</option>
                        <option value="Nữ">Nữ</option>
                        <option value="Khác">Khác</option>
                    </select>
                    <input type="tel" id="phoneNumber" class="form-control" placeholder="Số điện thoại">
                    <input type="email" id="email" class="form-control" placeholder="Email">
                    <input type="text" id="address" class="form-control" placeholder="Địa chỉ">
                </div>

                <input type="password" id="password" class="form-control" placeholder="Mật khẩu" required>
                
                <div class="d-flex justify-content-end align-items-center mb-4 mt-2" id="forgotPasswordDiv">
                    <a href="#" class="forgot-link">Quên mật khẩu</a>
                </div>

                <button type="submit" class="btn btn-primary" id="loginBtn">Đăng nhập</button>
            </form>

            <div class="signup-text" id="toggleTextDiv">
                Chưa có tài khoản? <a id="toggleModeBtn">Đăng ký</a>
            </div>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        document.getElementById('toggleModeBtn').addEventListener('click', toggleMode);

        function toggleMode(e) {
            if(e) e.preventDefault();
            isLoginMode = !isLoginMode;
            
            const registerFields = document.getElementById('registerFields');
            const forgotPasswordDiv = document.getElementById('forgotPasswordDiv');
            const loginBtn = document.getElementById('loginBtn');
            const title = document.getElementById('formTitle');
            const toggleTextDiv = document.getElementById('toggleTextDiv');

            if (isLoginMode) {
                registerFields.style.display = 'none';
                forgotPasswordDiv.style.display = 'flex';
                loginBtn.innerText = 'Đăng nhập';
                title.innerText = 'Chào mừng bạn quay lại';
                toggleTextDiv.innerHTML = 'Chưa có tài khoản? <a id="toggleModeBtn">Đăng ký</a>';
                
                document.getElementById('age').required = false;
                document.getElementById('gender').required = false;
                document.getElementById('phoneNumber').required = false;
                document.getElementById('email').required = false;
                document.getElementById('address').required = false;
            } else {
                registerFields.style.display = 'block';
                forgotPasswordDiv.style.display = 'none';
                loginBtn.innerText = 'Tạo tài khoản';
                title.innerText = 'Tạo tài khoản';
                toggleTextDiv.innerHTML = 'Đã có tài khoản? <a id="toggleModeBtn">Đăng nhập</a>';
                
                document.getElementById('age').required = true;
                document.getElementById('gender').required = true;
                document.getElementById('phoneNumber').required = true;
                document.getElementById('email').required = true;
                document.getElementById('address').required = true;
            }
            
            document.getElementById('toggleModeBtn').addEventListener('click', toggleMode);
        }

        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const fullName = document.getElementById('fullName').value;
            const password = document.getElementById('password').value;
            const loginBtn = document.getElementById('loginBtn');
            const errorMsg = document.getElementById('errorMsg');

            loginBtn.disabled = true;
            loginBtn.innerText = isLoginMode ? 'Đang đăng nhập...' : 'Đang tạo tài khoản...';
            errorMsg.style.display = 'none';

            try {
                let url = isLoginMode ? '/api/login' : '/api/register';
                let bodyData = { FullName: fullName, Password: password };
                
                if (!isLoginMode) {
                    bodyData.Age = parseInt(document.getElementById('age').value) || 0;
                    bodyData.Gender = document.getElementById('gender').value;
                    bodyData.PhoneNumber = document.getElementById('phoneNumber').value;
                    bodyData.Email = document.getElementById('email').value;
                    bodyData.Address = document.getElementById('address').value;
                }

                const response = await fetch(url, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(bodyData)
                });

                if (response.ok) {
                    const data = await response.json();
                    localStorage.setItem('patientId', data.patientId);
                    localStorage.setItem('patientName', data.fullName);
                    window.location.href = '/index.html';
                } else {
                    errorMsg.style.display = 'block';
                    errorMsg.innerText = isLoginMode ? 'Tên đăng nhập hoặc mật khẩu không đúng.' : 'Đăng ký thất bại. Tên đăng nhập có thể đã tồn tại.';
                    loginBtn.disabled = false;
                    loginBtn.innerText = isLoginMode ? 'Đăng nhập' : 'Tạo tài khoản';
                }
            } catch (err) {
                errorMsg.style.display = 'block';
                errorMsg.innerText = 'Không thể kết nối đến máy chủ.';
                loginBtn.disabled = false;
                loginBtn.innerText = isLoginMode ? 'Đăng nhập' : 'Tạo tài khoản';
            }
        });
    </script>
</body>
</html>
