<!doctype html>
<html lang="vi">

<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Theo dõi bản ghi ECG</title>
	<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
	<link rel="stylesheet" href="style.css">
</head>

<body>
	<div class="container py-5">
		<header class="text-center mb-4">
			<h1 class="fw-bold">Theo dõi bản ghi ECG</h1>
			<p class="text-muted">Xem và phân tích dữ liệu sóng điện tim từ các bản ghi đã lưu</p>
			<div class="d-flex justify-content-center flex-wrap gap-2 mb-3">
				<a id="envDummy" href="profile.html" class="btn btn-primary" role="button">Hồ sơ bệnh nhân</a>
				<button id="demoBtn" class="btn btn-outline-primary">Xem dữ liệu minh họa</button>
				<button id="logoutBtn" class="btn btn-outline-secondary">Đăng xuất</button>
				<button id="resetDbBtn" class="btn btn-outline-danger">Làm mới tư vấn</button>
			</div>
		</header>

		<main>
			<div class="card shadow-sm records-card">
				<div class="card-header d-flex justify-content-between align-items-center">
					<div>
						<strong>Bản ghi</strong> <span class="text-muted" id="totalRecordsCount">(0 bản ghi)</span>
					</div>
				</div>
				<div class="card-body p-0">
					<div class="table-responsive">
						<table class="table mb-0" id="recordsTable">
							<thead class="table-light small text-muted">
								<tr>
									<th style="width:80px">ID</th>
									<th>Tên bản ghi</th>
									<th class="action-column" style="width:120px">Thao tác</th>
								</tr>
							</thead>
							<tbody>
								<!-- rows injected by JS -->
								<!-- Detail panel is dynamically inserted into this container -->
								<tr id="detailContainer" class="d-none">
									<td colspan="3">
										<div id="detailPanel" class="detail-panel">
											<div class="detail-card shadow-sm">
												<button id="detailClose" class="btn-close" aria-label="Close"></button>
												<div class="d-flex justify-content-center gap-3 my-3">
													<div class="text-center">
													<div class="detail-label text-muted large">Nhịp tim</div>
														<div class="circle-outer">
															<div class="circle-inner">
													<div id="bpmValue" class="bpm">-- bpm</div>
															</div>
														</div>
													</div>
													<div class="text-center">
														<div class="detail-label text-muted large">RMSSD</div>
														<div class="circle-outer2">
															<div class="circle-inner2">
													<div id="rmssdValue" class="bpm2">-- ms</div>
															</div>
														</div>
													</div>
												</div>
												<div class="detail-meta text-center text-muted mt-2" id="detailMeta">
													Bản ghi ECG #1
												</div>
												<canvas id="detailChart" width="600" height="240"
													style="max-width:100%;"></canvas>
											</div>
										</div>
									</td>
								</tr>
							</tbody>
						</table>
					</div>
				</div>
				<div class="card-footer d-flex justify-content-between align-items-center">
					<div>
						<button id="prevBtn" class="btn btn-sm btn-outline-secondary" disabled>Trước</button>
					</div>
					<div class="text-center text-muted small">
						Trang <span id="pageInfo">1</span> / <span id="pageCount">1</span>
					</div>
					<div>
						<button id="nextBtn" class="btn btn-sm btn-outline-secondary">Sau</button>
					</div>
				</div>
			</div>
		</main>
	</div>
	<!-- scripts -->
	<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
	<script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/7.0.5/signalr.min.js"></script>
	<script src="csv_module.js"></script>
	<script src="index.js"></script>
</body>

</html>
